steps:
  - action: form
    key: form
    title:
      en-us: "👩‍🎓 Default Roles"
      pt-br: "👩‍🎓 Cargos Padrão"
    description:
      en-us: Enabling this feature allows me to automatically assign roles to new members when they join your server
      pt-br: Ativar esta função faz com que eu atribua cargos automaticamente quando alguém entrar no seu servidor
    footer:
      en-us: "• Use the `/report` command to tell me a bug"
      pt-br: "• Use o comando `/reportar` para me contar um bug"

  - action: multi_select
    key: default_roles_config
    title:
      en-us: Default Roles
      pt-br: Cargos Padrão
    description:
      en-us: "Choose roles to assign automatically to new bots and members"
      pt-br: "Escolha cargos para atribuir automaticamente a novos bots e membros"
    footer:
      en-us: "• Use the `/report` command to tell me a bug"
      pt-br: "• Use o comando `/reportar` para me contar um bug"
    selects:
      - type: available_roles
        key: default_roles_bot
        style: role
        label:
          en-us: "Roles for Bots"
          pt-br: "Cargos para Bots"
        placeholder:
          en-us: "Roles for Bots..."
          pt-br: "Cargos para Bots..."
      - type: available_roles
        key: default_roles
        style: role
        label:
          en-us: "Roles for Members"
          pt-br: "Cargos para Membros"
        placeholder:
          en-us: "Roles for Members..."
          pt-br: "Cargos para Membros..."

  - action: resume
    key: confirm
    title:
      en-us: ":white_check_mark: Alright?"
      pt-br: ":white_check_mark: Tudo certo?"
    description:
      en-us: Enabling this feature allows me to automatically assign roles to new members when they join your server
      pt-br: Ativar esta função faz com que eu atribua cargos automaticamente quando alguém entrar no seu servidor!
    footer:
      en-us: "• Use the `/report` command to tell me a bug"
      pt-br: "• Use o comando `/reportar` para me contar um bug"
