pt-br:
  command-generic-error:
    title: Erro ao Processar Comando
    message: "Desculpe, mas não consegui processar seu comando corretamente. Por favor, tente novamente mais tarde.\n\nSe quiser, me envie um report com o comando `/reportar`, ou fale comigo no meu servidor oficial usando o comando `/suporte` 💌"

  command-permission-denied:
    title: Permissão Negada
    message: Ops! Desculpe, mas você não tem permissão para executar este comando :/

  command-required-interaction:
    title: Interação Necessária
    message: Por favor, selecione qualquer opção para prosseguir! :)

  command-default-roles-low-permissions:
    title: Permissões de Cargo Insuficientes
    message: "Eu não tenho permissão para atribuir cargos neste servidor :/\n\nNa hierarquia de cargos do servidor, me dê um cargo **acima** dos que você quer que eu atribua 🧑‍⚖️"

  command-default-roles-missing-permissions:
    message: "Não tenho mais permissão para atribuir os seguintes cargos: **$roles**\n\nNa hierarquia de cargos do servidor, me dê um cargo **acima** desses 🧑‍⚖️"

  command-default-roles-disactivated:
    message: A funcionalidade de atribuir cargos automaticamente está desabilitada. Para ativar e configurá-la, é só rodar o comando `/cargos padrão` 🐶

  translate-message:
    unknown-language: Desconhecido

    translation-generic-error:
      title: Erro ao Traduzir
      message: "Desculpe, mas não consegui traduzir a mensagem corretamente. Por favor, tente novamente mais tarde."

    translation-invalid-message:
      title: Mensagem Inválida
      message: "Ops! Essa mensagem não pode ser traduzida. Escolha uma mensagem válida e tente novamente 🐾"

    translation-only-link:
      title: Mensagem Contém Apenas um Link
      message: "Ops! Não consigo traduzir uma mensagem que tem só um link. Escolha uma com texto e tente novamente 🐾"

  streamer-not-found:
    title: Streamer Não Encontrado
    message: "Desculpe, mas não consegui encontrar o streamer que você está procurando. Por favor, verifique o nome e tente novamente."

  streamer-already-registered:
    title: Streamer Já Registrado
    message: "A notificação das lives desse streamer já está configurada nesse servidor. Por favor, selecione outro streamer e tente novamente."

  youtuber-already-registered:
    title: Youtuber Já Registrado
    message: "A notificação dos vídeos desse youtuber já está configurada nesse servidor. Por favor, selecione outro youtuber e tente novamente."

  youtuber-not-found:
    title: Youtuber Não Encontrado
    message: "Desculpe, mas não consegui encontrar o youtuber que você está procurando. Por favor, verifique o nome e tente novamente."

  selection-required:
    title: Seleção Obrigatória
    message: "Ops! Selecione uma opção antes de confirmar :)"

  invalid-date:
    title: Data Inválida
    message: "Ops! Essa data não existe. Escolha um dia válido para o mês selecionado."

  reminders-birthdays-disabled:
    title: Lembretes de Aniversário Não Configurados
    message: "Desculpe, esse servidor ainda não configurou os lembretes de aniversário! Peça pra um admin rodar o comando `/moderações aniversários lembretes` antes 🎂"

  reminders-birthdays-self-edit-limit:
    title: Edição de Aniversário Bloqueada
    message: "Você já usou sua edição de aniversário neste servidor. Se precisar corrigir de novo, fale com um moderador."
