en-us:
  command-generic-error:
    title: Command Processing Error
    message: "I'm sorry, but I couldn't process your command correctly. Please try again later.\n\nIf you'd like, send me a report using the `/report` command, or reach out on my official server with the `/support` command 💌"

  command-permission-denied:
    title: Permission Denied
    message: Oops! Sorry, but you don't have the permissions to run this command :/

  command-required-interaction:
    title: Interaction Required
    message: Please select any option to proceed! :)

  command-default-roles-low-permissions:
    title: Insufficient Role Permissions
    message: "I don't have permission to assign roles on this server :/\n\nIn the server's role hierarchy, please give me a role **above** the ones you want me to assign 🧑‍⚖️"

  command-default-roles-missing-permissions:
    message: "I no longer have permission to assign the following roles: **$roles**\n\nIn the server's role hierarchy, please give me a role **above** these 🧑‍⚖️"

  command-default-roles-disactivated:
    message: The role assignment feature is currently disabled. To activate and configure this feature, just run the `/default roles` command 🐶

  translate-message:
    unknown-language: Unknown

    translation-generic-error:
      title: Translation Error
      message: "I'm sorry, but I couldn't translate the message correctly. Please try again later."

    translation-invalid-message:
      title: Invalid Message
      message: "Oops! That message can't be translated. Please pick a valid message and try again 🐾"

    translation-only-link:
      title: Message Contains Only a Link
      message: "Oops! I can't translate a message that's just a link. Please pick a message with text and try again 🐾"

  streamer-not-found:
    title: Streamer Not Found
    message: "I'm sorry, but I couldn't find the streamer you're looking for. Please check the name and try again."

  streamer-already-registered:
    title: Streamer Already Registered
    message: "The notification of this streamer's lives is already set up on this server. Please select another streamer and try again."

  youtuber-already-registered:
    title: Youtuber Already Registered
    message: "The notification of this youtuber's videos is already set up on this server. Please select another youtuber and try again."

  youtuber-not-found:
    title: Youtuber Not Found
    message: "I'm sorry, but I couldn't find the youtuber you're looking for. Please check the name and try again."

  selection-required:
    title: Selection Required
    message: "Oops! Please pick an option before confirming :)"
