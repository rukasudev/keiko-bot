en-us:
  commands:
    commons:
      embed:
        footer: "Use the `/report` command to tell me a bug"
      months:
        january: January
        february: February
        march: March
        april: April
        may: May
        june: June
        july: July
        august: August
        september: September
        october: October
        november: November
        december: December
      birthday-params:
        member:
          name: member
          desc: Member whose birthday will be registered
        day:
          name: day
          desc: "Birthday day (1-31)"
        month:
          name: month
          desc: "Birthday month"

    help:
      name: help
      desc: Keiko helps you understand how to use the available commands
      embed:
        title: 📚 Available commands
        desc:
          "Here are my commands that will help you make your server more cozy! ✨\n\n
          Select a command below to see its description and run it directly ⬇️\n\n"
        placeholder: Select a command
        base-commands: Base commands

      embed-desc:
        title: 📚 Command description
        desc: "If you need more information about a specific command, don't hesitate to send us a message on my official server with the `/support` command! 💌\n\n"

    report:
      name: report
      desc: Keiko helps you report any bugs or issues you encounter
      response:
        title: 📝 Report sent!
        message: I've passed your report to my team! Check your DMs, I just sent you a message with more details 💌
        footer: If you need help, don't hesitate to call us on my official server with the `/support` command.
      dm-message:
        title: 📝 Your ticket has been created!
        fields:
          title: Title
          description: Description
          command: Command
          author: Author
          atachments: Attachment
          no-atachments: Without attachments
        footer: If you need help, don't hesitate to call us on my official server with the `/support` command.

    support:
      name: support
      desc: Keiko shows you how you can get help through your official server
      response:
        title: 💌 Support
        message: "[✨ Click here to join my official server ✨](https://discord.gg/Hdg239Cvbd)"
        field:
          title: How to ask for help 🙋‍♂️
          desc: "1. Go to the **#support** channel and describe your problem
            \n2. Wait for a team member to respond
            \n3. If necessary, a team member will call you to a private support room"
        footer: Use the `/help` command to better understand how to use the available commands.

    ping:
      name: ping
      desc: Keiko shows you what your current response time is
      response:
        title: 🏓 Pong!
        message: My current latency is **$ping ms** 🐾

    translate-message:
      name: Translate Message
      desc: Keiko translates a message into your preferred language
      response:
        title: 🌐 Translate Message
        message: "I used my polyglot skills to translate the message you sent: {message_url}!\n\n**Original ({src_lang})**\n{original_message}\n\n**Translated ({dest_lang})**\n{translated_message}"
        footer: If you need help, don't hesitate to call us on my official server with the `/support` command.

    block-links:
      subgroup: block
      name: links
      desc: Keiko lovingly protects our server by blocking any suspicious links

    welcome-messages:
      subgroup: welcome
      name: messages
      desc: Keiko warmly welcomes new members with a personalized message

    notifications-twitch:
      subgroup: twitch
      name: lives
      desc: Keiko will notify you whenever your favorite streamers is online on Twitch

    notifications-youtube:
      subgroup: youtube
      name: videos
      desc: Keiko will notify you whenever your favorite YouTubers uploads a new video on YouTube

    moderations-birthdays:
      subgroup: birthdays
      name: reminders
      desc: Keiko warmly celebrates your members' birthdays with personalized messages

    moderations-birthdays-add:
      name: add
      desc: Quickly register a member birthday
      response:
        title: 🎂 Birthday registered!
        message: "I saved {member}'s birthday for **{date}**.\n\nTo review all reminders, use `/moderations birthdays reminders`."
        footer: "Use the `/report` command to tell me a bug"

    birthday-personal:
      name: birthday
      desc: Keiko remembers your birthday and celebrates it on your server
      response:
        title: 🎂 Birthday saved!
        message: "All set! I'll keep **{date}** safe and get ready to celebrate when the day arrives."
        footer: "Use the `/report` command to tell me a bug"
      overwrite-confirm:
        title: 🎂 Update birthday?
        message: "You already have a birthday saved on **{current_date}**. Do you want to overwrite it with **{new_date}**? This is your last edit."
        footer: "Use the `/report` command to tell me a bug"
      overwrite-response:
        title: 🎂 Birthday updated!
        message: "I updated your birthday to **{date}**. I'll use this new date from now on."
        footer: "Use the `/report` command to tell me a bug"

    default-roles:
      subgroup: default
      name: roles
      desc: Keiko warmly welcomes new members by automatically assigning roles when they join the server
      warning: If a role isn't showing up, make sure my role is **above** the role you want to assign to new members 🧑‍⚖️

    stream-elements:
      subgroup: streamelements
      name: commands
      desc: Keiko responds to StreamElements commands here in Discord chat

    setup:
      name: setup
      desc: Keiko shows you all features available and helps you set them up
      embed:
        title: "⚙️ Server Setup"
        desc: "Here you can see and manage all my features! Use the buttons below or type the command to get started 🐾"
        enabled: Enabled
        not-configured: Not configured
        paused: Paused
        all-configured: "All features are configured! Use each command to manage them ✨"
        footer: "Use the `/report` command to tell me a bug"

  groups:
    moderations: moderations
    notifications: notifications
    integrations: integrations

  command-events:
    enabled:
      title: 🎉 Command enabled successfully!
      key: Enabled
      description: "Command **$command_name** enabled on $date by $user 🚀\n\n
        To make changes or disable it, use the command `/$command_name` or `/$setup_command` 🔄"
      short-description: ✅ Enabled by $user
      short-description-with-cog: ✅ **$cog_name** enabled by $user

    paused:
      title: ⏸️ Command paused successfully!
      key: Paused
      action: Pause
      description: Command **$command_name** paused on $date by $user
      short-description: ⏸️ Paused by $user
      short-description-with-cog: ⏸️ **$cog_name** paused by $user

    unpaused:
      title: ▶️ Command unpaused successfully!
      key: Unpaused
      action: Unpause
      description: Command **$command_name** unpaused on $date by $user
      short-description: ▶️ Unpaused by $user
      short-description-with-cog: ▶️ **$cog_name** unpaused by $user

    disabled:
      title: 🚫 Command disabled successfully!
      action: Disable
      description: Command **$command_name** disabled on $date by $user
      short-description: 🚫 Disabled by $user
      short-description-with-cog: 🚫 **$cog_name** disabled by $user

    edited:
      title: 📝 Command edited successfully!
      description: Command **$command_name** edited on $date by $user
      placeholder: Select the settings you want to edit
      short-description: 📝 Edited by $user
      short-description-with-cog: 📝 **$cog_name** edited by $user

    added:
      title: ➕ Item added to **$command_name** successfully!
      action: Add
      description: A item was added to **$command_name** on $date by $user
      short-description: ➕ Item added by $user
      short-description-with-cog: ➕ **$cog_name** added by $user

    removed:
      title: 🗑️ Item removed from **$command_name** successfully!
      action: Remove
      description: A item was removed from **$command_name** on $date by $user
      placeholder: Select the item you want to remove
      short-description: 🗑️ Item removed by $user
      short-description-with-cog: 🗑️ **$cog_name** removed by $user

    system:
      description: That is a default action taken by Keiko when leaving the server

  confirmation-modal:
    title: Are you sure?
    desc: Type `$action` to confirm.

  pagination-view:
    footer: Page

  resume:
    settings: Settings
