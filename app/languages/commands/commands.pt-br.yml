pt-br:
  commands:
    help:
      name: ajuda
      desc: Keiko ajuda você a entender como usar os comandos disponíveis
      embed:
        title: 📚 Comandos disponíveis
        desc:
          "Aqui estão meus comandos que irão te ajudar a deixar seu servidor mais aconchegante! ✨\n\n
          Selecione um comando abaixo para ver sua descrição e executá-lo diretamente ⬇️\n\n"
        placeholder: Selecione um comando
        base-commands: Comandos base

      embed-desc:
        title: 📚 Descrição do comando
        desc: "Se você precisar de mais informações sobre um comando específico, é só me chamar no meu servidor oficial com o comando `/suporte`! 💌\n\n"

    report:
      name: reportar
      desc: Keiko ajuda você a relatar quaisquer bugs ou problemas que encontrar
      response:
        title: 📝 Report enviado!
        message: Passei seu report para a minha equipe! Olha sua DM, acabei de te mandar uma mensagem com mais detalhes 💌
        footer: Se precisar de ajuda, é só me chamar no meu servidor oficial com o comando `/suporte`.
      dm-message:
        title: 📝 Seu ticket foi criado!
        fields:
          title: Título
          description: Descrição
          command: Comando
          author: Autor
          atachments: Anexo
          no-atachments: Sem anexos
        footer: Se precisar de ajuda, é só me chamar no meu servidor oficial com o comando `/suporte`.

    support:
      name: suporte
      desc: Keiko mostra como você pode obter ajuda atráves do seu servidor oficial
      response:
        title: 💌 Suporte
        message: "[✨ Clique aqui para entrar no meu servidor oficial ✨](https://discord.gg/Hdg239Cvbd)"
        field:
          title: Como pedir ajuda 🙋‍♂️
          desc: "1. Vá até o canal **#support** e descreva seu problema
            \n2. Aguarde um membro da equipe responder
            \n3. Se necessário, um membro da equipe irá te chamar para uma sala de suporte privada"
        footer: Use o comando `/ajuda` para entender melhor como usar os comandos disponíveis.

    ping:
      name: ping
      desc: Keiko mostra qual o seu tempo de resposta atual
      response:
        title: 🏓 Pong!
        message: Minha latência atual é de **$ping ms** 🐾

    translate-message:
      name: Traduzir Mensagem
      desc: Keiko traduz uma mensagem para o seu idioma preferido
      response:
        title: 🌐 Traduzir Mensagem
        message: "Usei meus dotes poliglotas para traduzir a mensagem que você pediu: {message_url}!\n\n**Original ({src_lang})**\n{original_message}\n\n**Tradução ({dest_lang})**\n{translated_message}"
        footer: Se precisar de ajuda, é só me chamar no meu servidor oficial com o comando `/suporte`.

    block-links:
      subgroup: bloquear
      name: links
      desc: Keiko protege carinhosamente nosso servidor bloqueando qualquer link suspeito

    welcome-messages:
      subgroup: mensagens
      name: boas-vindas
      desc: Keiko recebe calorosamente novos membros com mensagens personalizadas

    notifications-twitch:
      subgroup: twitch
      name: lives
      desc: Keiko notificará você sempre que seus streamers favoritos estiverem ao vivo na Twitch

    notifications-youtube:
      subgroup: youtube
      name: vídeos
      desc: Keiko notificará você sempre que seus youtubers favoritos postarem um novo vídeo no YouTube

    default-roles:
      subgroup: cargos
      name: padrão
      desc: Keiko recebe calorosamente novos membros atribuindo cargos automaticamente ao entrarem no servidor
      warning: Se algum cargo não estiver aparecendo, verifique se o **meu cargo** está acima do cargo que você quer atribuir aos novos membros 🧑‍⚖️

    stream-elements:
      subgroup: comandos
      name: streamelements
      desc: Keiko responde a comandos do StreamElements aqui no chat do Discord

    setup:
      name: configurar
      desc: Keiko mostra todas as funcionalidades disponíveis e te ajuda a configurá-las
      embed:
        title: "⚙️ Configuração do Servidor"
        desc: "Aqui você pode ver e gerenciar todas as minhas funcionalidades! Use os botões abaixo ou digite o comando para começar 🐾"
        enabled: Ativado
        not-configured: Não configurado
        paused: Pausado
        all-configured: "Todas as funcionalidades estão configuradas! Use cada comando para gerenciá-las ✨"
        footer: "Use o comando `/reportar` para me contar um bug"

  groups:
    moderations: moderações
    notifications: notificações
    integrations: integrações

  command-events:
    enabled:
      key: Ativado
      title: 🎉 Funcionalidade ativada com sucesso!
      description: "Comando **$command_name** ativado as $date por $user 🚀\n\n
        Para fazer alterações ou desativar, use o comando `/$command_name` ou `/$setup_command` 🔄"
      short-description: ✅ Ativado por $user

    paused:
      title: ⏸️ Comando pausado com sucesso!
      key: Pausado
      action: Pausar
      description: Comando **$command_name** pausado as $date por $user
      short-description: ⏸️ Pausado por $user

    unpaused:
      title: ▶️ Comando despausado com sucesso!
      key: Despausado
      action: Despausar
      description: Comando **$command_name** despausado as $date por $user
      short-description: ▶️ Despausado por $user

    disabled:
      title: 🚫 Comando desativado com sucesso!
      action: Desativar
      description: Comando **$command_name** desativado as $date por $user
      short-description: 🚫 Desativado por $user

    edited:
      title: 📝 Comando editado com sucesso!
      description: Comando **$command_name** editado as $date por $user
      placeholder: Selecione as configurações que deseja editar
      short-description: 📝 Editado por $user

    added:
      title: ➕ Item adicionado ao **$command_name** com sucesso!
      action: Adicionar
      description: Um item foi adicionado a **$command_name** as $date por $user
      short-description: ➕ Item adicionado por $user

    removed:
      title: 🗑️ Item removido de **$command_name** com sucesso!
      action: Remover
      description: Um item foi removido de **$command_name** as $date por $user
      placeholder: Selecione o item que deseja remover
      short-description: 🗑️ Item removido por $user

    system:
      description: Essa é uma ação padrão feita por Keiko ao sair do servidor

  confirmation-modal:
    title: Tem certeza?
    desc: Digite `$action` para confirmar.

  pagination-view:
    footer: Página

  resume:
    settings: Configurações
